<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon: 3D Isometric Cube in dept Blue -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 2 L28 9 L28 23 L16 30 L4 23 L4 9 Z' fill='%230000FF'/><path d='M16 2 L28 9 L16 16 L4 9 Z' fill='%233333FF'/><path d='M16 16 L28 9 L28 23 L16 30 Z' fill='%230000CC'/></svg>">
    
    <!-- Fonts: Work Sans for body, Google Sans Code for technical -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <title>dept — Marketing Technology</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #F9F8F6;
            color: #000;
            /* Updated to Work Sans */
            font-family: "Work Sans", Arial, sans-serif, "Apple Color Emoji";
            font-size: 14px;
            letter-spacing: -0.01em; /* Work Sans looks better with a tighter tracking */
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 288px;
            max-width: 100%;
        }

        .section {
            margin-bottom: 2.5rem;
        }

        p {
            font-size: 14px;
            margin-bottom: 1.5rem;
            color: #000;
        }

        .dept {
            color: #FFF;
            font-family: "Work Sans", sans-serif;
            font-weight: 500;
            text-transform: lowercase;
            letter-spacing: 0.0em;
            background-color: #0000FF;
            border: 1px solid #0000FF;
            padding: 0 1px;
            cursor: default;
        }

        .dept:hover {
            color: #0000FF;
            background-color: #FFF;
            text-decoration: none;
        }

        a {
            color: #0000FF;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
            cursor: pointer;
            transition: opacity 0.2s ease-out;
        }

        a:hover {
            opacity: 0.5;
        }

        .mailto {
            font-size: 12px;
            /* Updated to Google Sans Code with Roboto Mono as fallback */
            font-family: "Google Sans Code", "Roboto Mono", monospace, "Apple Color Emoji";
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        .mailto:hover {
            opacity: 0.5;
        }

        .footer-section {
            margin-top: 4.0rem;
            margin-bottom: 0rem;
        }

        .footer-text {
            font-family: "Work Sans", sans-serif;
            font-size: 14px;
            font-weigh: 400;
            letter-spacing: 0.0em;
            color: #000;
        }
    </style>
</head>
<body>

    <main class="container">

        <section class="section">
            <p>
                <span class="dept">dept</span>
            </p>
            <p>
                — Marketing Technology<br>
                — Australia + www<br>
                <br>                
                Helping navigate<br>
                the internet of today<br>
                and of tomorrow
            </p>    
            <p>
                <a href="mailto:office@hidept.com?subject=Inquiry from hidepartment.com" target="_blank" class="mailto">office@hidept.com</a>
            </p>
        </section>

        <section class="footer-section">
            <p class="footer-text">—<br>©<span class="dept">dept</span>, 2026</p>
        </section>

    </main>

</body>
</html>
